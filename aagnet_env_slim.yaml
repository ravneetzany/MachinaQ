# Slim AAGNet environment - essential packages only
# Avoids the 3 GB full environment.yaml (~5-10 min vs 20-30 min)
# Targets PyTorch 2.0.1 + CUDA 11.8 (tested by AAGNet authors)
# Compatible with CUDA driver >= 452.39 (incl. 13.x)

name: pyocc
channels:
  - pytorch
  - nvidia
  - dglteam/label/cu118
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch=2.0.1
  - torchvision=0.15.2
  - pytorch-cuda=11.8
  - dgl=1.1.0.cu118
  - pythonocc-core=7.5.1
  - occt=7.5.1
  - numpy=1.24.3
  - scipy
  - h5py
  - scikit-learn
  - numba
  - tqdm
  - pip:
    - torch-ema==0.3
    - torchmetrics==0.11.4
    - pytorch-lightning==2.0.3
    - timm==0.9.2
    - loguru
    - wandb
    - occwl
